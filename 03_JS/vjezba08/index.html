<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nizovi — Zadaci (2 unosa)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Nizovi (JS ES6)</h1>
      <p>Unesite dvije vrijednosti i kliknite gumb. Rezultati svih zadataka se ispisuju u <strong>Console</strong>.</p>
    </header>

    <section class="card">
      <div class="grid">
        <div>
          <label for="inA">Vrijednost A</label>
          <input id="inA" placeholder="npr. 10 ili 'Marko'" />
        </div>
        <div>
          <label for="inB">Vrijednost B</label>
          <input id="inB" placeholder="npr. 40 ili 'Ana'" />
        </div>
        
      </div>
      <div>
          <button id="zad01">1. zadatak</button>
          <button id="zad02">2. zadatak</button>
          <button id="zad03">3. zadatak</button>
          <button id="zad04">4. zadatak</button>
          <button id="zad05">5. zadatak</button>
          <button id="zad06">6. zadatak</button>
          <button id="zad07">7. zadatak</button>
          <button id="zad08">8. zadatak</button>
          <button id="zad09">9. zadatak</button>
          <button id="zad10">10. zadatak</button>
        </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
